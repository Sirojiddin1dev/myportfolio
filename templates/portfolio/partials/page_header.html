{% load translation_tags %}
<section class="relative min-h-[340px] flex items-center bg-no-repeat bg-cover bg-center" style="background-image: linear-gradient(rgba(7, 6, 64, 0.82), rgba(12, 11, 72, 0.88)), url('{{ site_settings|asset_url:'hero_background_image' }}');">
    <div class="wraper pt-[80px]">
        <div class="max-w-[720px]">
            <span class="inline-block mb-[15px] text-[#fe3e57] tracking-[3px] uppercase text-[14px]">{{ subtitle }}</span>
            <h1 class="text-[70px] md:text-[48px] sm:text-[32px] leading-[1.1] text-[#fff] font-bold">{{ title }}</h1>
        </div>
    </div>
</section>
